<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Solid black octocat silhouette (image 2 style) -->
  <!-- Left ear stepped triangle -->
  <rect x="10" y="4"  width="4"  height="4"  fill="black"/>
  <rect x="8"  y="8"  width="8"  height="4"  fill="black"/>
  <rect x="6"  y="12" width="10" height="4"  fill="black"/>
  <!-- Right ear stepped triangle -->
  <rect x="50" y="4"  width="4"  height="4"  fill="black"/>
  <rect x="48" y="8"  width="8"  height="4"  fill="black"/>
  <rect x="48" y="12" width="10" height="4"  fill="black"/>
  <!-- Head solid block -->
  <rect x="6"  y="14" width="52" height="24" fill="black"/>
  <!-- Eye whites -->
  <rect x="16" y="20" width="8"  height="8"  fill="white"/>
  <rect x="40" y="20" width="8"  height="8"  fill="white"/>
  <!-- Pupils -->
  <rect x="18" y="22" width="4"  height="4"  fill="black"/>
  <rect x="42" y="22" width="4"  height="4"  fill="black"/>
  <!-- Body -->
  <rect x="18" y="38" width="28" height="12" fill="black"/>
  <!-- Left tentacles -->
  <rect x="4"  y="36" width="14" height="4"  fill="black"/>
  <rect x="4"  y="44" width="12" height="4"  fill="black"/>
  <rect x="6"  y="52" width="8"  height="4"  fill="black"/>
  <!-- Right tentacles -->
  <rect x="46" y="36" width="14" height="4"  fill="black"/>
  <rect x="48" y="44" width="12" height="4"  fill="black"/>
  <rect x="50" y="52" width="8"  height="4"  fill="black"/>
  <!-- Bottom centre tentacle -->
  <rect x="28" y="50" width="8"  height="4"  fill="black"/>
  <rect x="30" y="54" width="4"  height="4"  fill="black"/>
</svg>
