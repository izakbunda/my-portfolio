<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Handle: thick U-arch open at bottom -->
  <path d="M20,20 L20,10 L44,10 L44,20"
        fill="none" stroke="black" stroke-width="5" stroke-linejoin="miter"/>
  <!-- Body with stepped bottom corners -->
  <polygon points="4,20 60,20 60,56 56,60 8,60 4,56"
           fill="white" stroke="black" stroke-width="5" stroke-linejoin="miter"/>
  <!-- Horizontal seam across middle -->
  <rect x="4" y="38" width="56" height="4" fill="black"/>
  <!-- Latch: small outlined rect with bar -->
  <rect x="25" y="32" width="14" height="10" fill="white" stroke="black" stroke-width="4"/>
  <rect x="28" y="35" width="8" height="4" fill="black"/>
</svg>
