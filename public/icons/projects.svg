<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Folder: tab top-left with stepped right edge, body with stepped bottom corners -->
  <!-- Tab top goes x=8→22, then steps right to x=26 at y=12, then down to y=16 (body top) -->
  <polygon points="8,8 22,8 26,12 26,16 60,16 60,56 56,60 8,60 4,56 4,8"
           fill="white" stroke="black" stroke-width="5" stroke-linejoin="miter"/>
  <!-- Horizontal divider bar (top of folder body, below tab) -->
  <rect x="4" y="20" width="56" height="4" fill="black"/>
  <!-- Small latch dot on right -->
  <rect x="52" y="11" width="5" height="5" fill="black"/>
</svg>
