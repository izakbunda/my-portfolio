<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Page body with stepped dog-ear notch at top-right -->
  <polygon points="6,4 44,4 44,14 54,14 54,60 6,60"
           fill="white" stroke="black" stroke-width="5" stroke-linejoin="miter"/>
  <!-- Stepped dog-ear fill (solid black, 2-step stair) -->
  <polygon points="44,4 48,4 48,8 52,8 52,14 44,14" fill="black"/>
  <!-- Three bold text bars -->
  <rect x="14" y="24" width="28" height="5" fill="black"/>
  <rect x="14" y="35" width="28" height="5" fill="black"/>
  <rect x="14" y="46" width="28" height="5" fill="black"/>
</svg>
