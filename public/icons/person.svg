<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <!-- Outer box with stepped/pixel corners (matches image 3) -->
  <polygon points="8,4 56,4 60,8 60,56 56,60 8,60 4,56 4,8"
           fill="white" stroke="black" stroke-width="5" stroke-linejoin="miter"/>
  <!-- Head: square outline, white fill -->
  <rect x="22" y="13" width="20" height="18"
        fill="white" stroke="black" stroke-width="4"/>
  <!-- Shoulder arch: 3 sides open at bottom (Π shape) -->
  <path d="M12,52 L12,38 L52,38 L52,52"
        fill="none" stroke="black" stroke-width="4" stroke-linejoin="miter"/>
</svg>
